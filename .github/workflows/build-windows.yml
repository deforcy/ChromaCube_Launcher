# Builds the ChromaCube Launcher .exe on a real Windows runner (GitHub-hosted),
# the Windows analogue of build-macos.yml on the macos branch (which builds the
# .app on a GitHub-hosted Mac). Wails links against WebView2 via cgo/native
# Windows APIs, so - like the macOS build needing an actual Mac - this needs an
# actual Windows machine; a GitHub-hosted windows-latest runner is one.
#
# Trigger it from the Actions tab (workflow_dispatch) or on a tag push.

name: build-windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string baked into the app"
        default: "1.5.0"
      mode:
        description: "universal (prompts each user for a code) | group (bakes one code in)"
        default: "universal"
      code:
        description: "Access code to bake in (mode=group only)"
        default: ""
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build universal .exe
        if: ${{ github.event.inputs.mode != 'group' }}
        run: .\build-universal.ps1 -Version "${{ github.event.inputs.version || '1.5.0' }}"

      - name: Build group .exe
        if: ${{ github.event.inputs.mode == 'group' }}
        run: .\build-group.ps1 -Code "${{ github.event.inputs.code }}" -Version "${{ github.event.inputs.version || '1.5.0' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ChromaCube-Launcher-windows
          path: build/bin/*.exe
